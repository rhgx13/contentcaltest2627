  .poster{background:#0e0e12;border-radius:16px;padding:24px;font-family:var(--font-sans);}
  .poster-title{color:#fff;font-size:17px;font-weight:500;letter-spacing:.02em;margin-bottom:2px;}

  .controls{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .seg{display:flex;background:#17171d;border-radius:8px;padding:3px;gap:2px;}
  .seg-btn{border:none;background:transparent;color:#666;font-size:11px;font-weight:500;padding:5px 12px;border-radius:6px;cursor:pointer;transition:all .15s;font-family:var(--font-sans);}
  .seg-btn.active{background:#2a2a3a;color:#fff;}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;}
  .leg{display:flex;align-items:center;gap:5px;font-size:10px;color:#888;}
  .leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .grid{display:grid;gap:8px;}
  .grid-months{grid-template-columns:repeat(4,minmax(0,1fr));}
  .grid-markets{grid-template-columns:repeat(3,minmax(0,1fr));}
  .card{border-radius:10px;padding:10px;background:#17171d;}
  .card-label{font-size:10px;font-weight:500;color:#fff;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:.5px solid #242430;}
  .pills{display:flex;flex-wrap:wrap;gap:4px;}
  .pill{display:inline-block;border-radius:20px;padding:3px 9px;font-size:10px;font-weight:500;line-height:1.4;}
  .key    {background:#3C3489;color:#CECBF6;}
  .big    {background:#0F6E56;color:#9FE1CB;}
  .notable{background:#633806;color:#FAC775;}
  .base   {background:#1e1e28;color:#555;}
  .market-tag{font-size:9px;opacity:.55;margin-left:2px;}
  .empty{font-size:10px;color:#333;padding:4px 0;}

function emoji(league){
  const l = league.toLowerCase();
  if(l.includes('tennis') || l.includes('atp') || l.includes('wta') || l.includes('davis')) return '🎾';
  if(l.includes('motorsport') || l.includes('le mans') || l.includes('wec')) return '🏎️';
  if(l.includes('nations league')) return '🏆🌍';
  if(l.includes('euro 2028') || l.includes('euro quali')) return '🏆🌍';
  if(l.includes('supercopa')) return '🏆🇪🇸';
  if(l.includes('carabao')) return '🏆🏴󠁧󠁢󠁥󠁮󠁧󠁿';
  if(l.includes('fa cup')) return '🏆🏴󠁧󠁢󠁥󠁮󠁧󠁿';
  if(l.includes('efl playoff')) return '🏆🏴󠁧󠁢󠁥󠁮󠁧󠁿';
  if(l.includes('intercontinental')) return '🏆🌍';
  if(l.includes('copa libertadores')) return '🏆🌎';
  if(l.includes('copa sudamericana')) return '🏆🌎';
  if(l.includes('dfl supercup') || l.includes('beckenbauer')) return '🏆🇩🇪';
  if(l.includes('spfl') || l.includes('scottish')) return '⚽🏴󠁧󠁢󠁳󠁣󠁴󠁿';
  if(l.includes('efl')) return '⚽🏴󠁧󠁢󠁥󠁮󠁧󠁿';
  if(l.includes('laliga') || l.includes('la liga') || l.includes('supercopa')) return '⚽🇪🇸';
  if(l.includes('bundesliga')) return '⚽🇩🇪';
  if(l.includes('serie a')) return '⚽🇮🇹';
  if(l.includes('ligue')) return '⚽🇫🇷';
  return '⚽';
}

const MONTHS       = ['August','September','October','November','December','January','February','March','April','May','June'];
const MONTH_LABELS = ['Aug 2026','Sep 2026','Oct 2026','Nov 2026','Dec 2026','Jan 2027','Feb 2027','Mar 2027','Apr 2027','May 2027','Jun 2027'];
const MARKETS      = ['AU & NZ','AU','NZ'];
const MARKET_LABELS= {'AU & NZ':'AU & NZ','AU':'AU only','NZ':'NZ only'};

let currentView='months', currentMarket='all';

function tierClass(t){ return t==='Key Event'?'key':t==='Big Event'?'big':t==='Notable'?'notable':'base'; }
function tierOrder(t){ return t==='Key Event'?0:t==='Big Event'?1:t==='Notable'?2:3; }

function makePill(e, tag){
  const p = document.createElement('span');
  p.className = 'pill '+tierClass(e.tier);
  p.textContent = emoji(e.league)+' '+e.label;
  if(tag){ const s=document.createElement('span'); s.className='market-tag'; s.textContent=tag; p.appendChild(s); }
  return p;
}

function renderMonths(){
  const grid=document.getElementById('mainGrid');
  grid.className='grid grid-months'; grid.innerHTML='';
  MONTHS.forEach((m,i)=>{
    const evts=raw.filter(e=>e.month===m&&(currentMarket==='all'||e.market===currentMarket)).sort((a,b)=>tierOrder(a.tier)-tierOrder(b.tier));
    const card=document.createElement('div'); card.className='card';
    card.innerHTML=`<div class="card-label">${MONTH_LABELS[i]}</div>`;
    const pills=document.createElement('div'); pills.className='pills';
    if(!evts.length){ pills.innerHTML='<span class="empty">No events</span>'; }
    else evts.forEach(e=>{ const tag=currentMarket==='all'?(e.market==='AU & NZ'?' ·AU&NZ':e.market==='AU'?' ·AU':' ·NZ'):null; pills.appendChild(makePill(e,tag)); });
    card.appendChild(pills); grid.appendChild(card);
  });
}

function renderMarkets(){
  const grid=document.getElementById('mainGrid');
  grid.className='grid grid-markets'; grid.innerHTML='';
  MARKETS.forEach(m=>{
    const evts=raw.filter(e=>e.market===m).sort((a,b)=>tierOrder(a.tier)-tierOrder(b.tier));
    const card=document.createElement('div'); card.className='card';
    card.innerHTML=`<div class="card-label">${MARKET_LABELS[m]}</div>`;
    const pills=document.createElement('div'); pills.className='pills';
    evts.forEach(e=>{ const idx=MONTHS.indexOf(e.month); const mo=idx>=0?MONTH_LABELS[idx].slice(0,3):e.month.slice(0,3); const clone={...e,label:mo+' · '+e.label}; pills.appendChild(makePill(clone,null)); });
    card.appendChild(pills); grid.appendChild(card);
  });
}

function setView(v){
  currentView=v;
  document.querySelectorAll('#viewSeg .seg-btn').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase().includes(v==='months'?'month':'market')));
  document.getElementById('marketSeg').style.display=v==='months'?'flex':'none';
  render();
}
function setMarket(m){
  currentMarket=m;
  const map={'all':'All','AU & NZ':'AU & NZ','AU':'AU only','NZ':'NZ only'};
  document.querySelectorAll('#marketSeg .seg-btn').forEach(b=>b.classList.toggle('active',map[m]===b.textContent));
  render();
}
function render(){ currentView==='months'?renderMonths():renderMarkets(); }
render();
